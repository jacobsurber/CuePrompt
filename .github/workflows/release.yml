name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      APP_NAME: CuePrompt
      APP_BUNDLE: CuePrompt.app
      BINARY: .build/apple/Products/Release/CuePrompt

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Developer ID certificate
        if: env.DEVELOPER_ID_CERT_BASE64 != ''
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dev-id-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ Developer ID Application certificate not found in keychain"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "✅ Developer ID certificate imported: $IDENTITY"

      - name: Resolve release version
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="v$FILE_VERSION"

          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "ℹ️ Tag $TAG already exists — auto-bumping patch version"
            MAJOR=$(echo "$FILE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$FILE_VERSION" | cut -d. -f2)
            PATCH=$(echo "$FILE_VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            while git tag -l "v$NEW_VERSION" | grep -q "v$NEW_VERSION"; do
              PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            done
            echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
            echo "🚀 Auto-bumped to $NEW_VERSION"
          else
            echo "VERSION=$FILE_VERSION" >> "$GITHUB_ENV"
            echo "🚀 Will release $TAG"
          fi

      - name: Run tests
        run: swift test --parallel

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64 2>&1 || true
          if [ ! -f "$BINARY" ]; then
            echo "❌ Binary not found at $BINARY"
            exit 1
          fi
          echo "✅ Binary built: $(file "$BINARY")"

      - name: Create app bundle
        run: |
          BUILD_NUMBER="${VERSION//./}"

          mkdir -p "$APP_BUNDLE/Contents/"{MacOS,Resources}

          cp "$BINARY" "$APP_BUNDLE/Contents/MacOS/"
          chmod +x "$APP_BUNDLE/Contents/MacOS/$APP_NAME"

          # Copy SwiftPM resource bundles
          find .build/apple/Products/Release -maxdepth 1 -type d -name "*.bundle" -print0 | while IFS= read -r -d '' bundle; do
            cp -R "$bundle" "$APP_BUNDLE/Contents/Resources/"
          done

          # Generate Info.plist with version
          cat > "$APP_BUNDLE/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.cueprompt.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>CFBundleVersion</key>
              <string>$BUILD_NUMBER</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>CuePrompt uses your microphone to scroll your script as you speak. Audio is processed entirely on your device.</string>
              <key>NSSpeechRecognitionUsageDescription</key>
              <string>CuePrompt uses speech recognition to match your spoken words to your script. All recognition happens on-device.</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
          </dict>
          </plist>
          EOF

          plutil -lint "$APP_BUNDLE/Contents/Info.plist"

      - name: Code sign
        run: |
          ENTITLEMENTS="Entitlements/CuePrompt.entitlements"

          if [ -n "${SIGNING_IDENTITY:-}" ]; then
            echo "🔏 Signing with Developer ID..."
            codesign --force --deep --options runtime \
              --entitlements "$ENTITLEMENTS" \
              --sign "$SIGNING_IDENTITY" "$APP_BUNDLE"
          else
            echo "⚠️ No Developer ID — using ad-hoc signing"
            codesign --force --deep --options runtime \
              --entitlements "$ENTITLEMENTS" \
              --sign - "$APP_BUNDLE"
          fi

          codesign --verify --verbose "$APP_BUNDLE"

      - name: Notarize app
        if: env.SIGNING_IDENTITY != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "📤 Submitting for notarization..."
          ditto -c -k --keepParent "$APP_BUNDLE" "$APP_BUNDLE.zip"

          xcrun notarytool submit "$APP_BUNDLE.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "📎 Stapling notarization ticket..."
          xcrun stapler staple "$APP_BUNDLE"

          rm -f "$APP_BUNDLE.zip"
          echo "✅ App notarized and stapled"

      - name: Create zip
        run: zip -r "${APP_NAME}-${VERSION}.zip" "$APP_BUNDLE"

      - name: Create DMG
        run: |
          STAGING=$(mktemp -d)
          cp -R "$APP_BUNDLE" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "${APP_NAME}-${VERSION}.dmg"
          rm -rf "$STAGING"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

          cat > /tmp/release-notes.md <<'NOTES'
          ## Installation

          1. Download the `.dmg` file below and drag **CuePrompt.app** into `/Applications/`.
          2. If macOS blocks the app on first launch, run this once:
             ```bash
             sudo xattr -cr /Applications/CuePrompt.app
             ```
          3. Open CuePrompt from `/Applications/`. On first launch, grant the requested permissions:
             - **Microphone** — for voice recognition to pace scrolling
             - **Speech Recognition** — for on-device word matching

          > You only need to run the `xattr` command once per download. Permissions persist across app restarts.

          NOTES

          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then
            echo -e "\n## What's Changed\n" >> /tmp/release-notes.md
            gh api repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG} \
              --jq '.commits[] | "- " + (.commit.message | split("\n")[0]) + " (" + (.sha[:7]) + ")"' \
              >> /tmp/release-notes.md 2>/dev/null || true
          fi

          gh release create "$TAG" \
            "${APP_NAME}-${VERSION}.zip" \
            "${APP_NAME}-${VERSION}.dmg" \
            --title "$APP_NAME $VERSION" \
            --notes-file /tmp/release-notes.md
